version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cub_postgres
    environment:
      POSTGRES_USER: cub_admin
      POSTGRES_PASSWORD: cub_password
      POSTGRES_DB: room_booking
      TZ: Asia/Taipei
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cub_admin -d room_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cub_backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://cub_admin:cub_password@db:5432/room_booking
      TZ: Asia/Taipei
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  pgdata:
